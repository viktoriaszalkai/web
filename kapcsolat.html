<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kapcsolat - Szalkai Viktória portfólió</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="https://fonts.cdnfonts.com/css/dealoras" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Monsieur+La+Doulaise&family=Pinyon+Script&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container oldal_keret d-flex flex-column">
      <header
        class="fejlec_zona kapcsolat_1 d-flex justify-content-center align-items-center flex-column"
      >
        <nav class="nav">
          <a class="nav-link" href="index.html">Rólam</a>
          <a class="nav-link" href="portfolio.html">Portfólió</a>
          <a class="nav-link" href="kapcsolat.html">Kapcsolat</a>
        </nav>
        <h1 class="focim">Kapcsolat</h1>
      <div class="mt-3">
          <button onclick="monokrom()" class="btn btn-sm btn-outline-light">Monokróm stílus</button>
        </div>
      </header>

      <main class="fo_kontener d-flex flex-column">
        <div
          class="also_szekcio also_zona kapcsolat_2 d-flex justify-content-center align-items-center"
        >
          <div id="urlap_kontener" class="container py-4">
            <h2>Van egy ötleted?</h2>
            <form action="#" method="post">
              <div class="mb-3">
                <label for="nev" class="form-label">Név:</label>
                <input
                  type="text"
                  class="form-control"
                  id="nev"
                  name="nev"
                  required
                  placeholder="Név"
                />
              </div>

              <div class="mb-3">
                <label for="email" class="form-label">Email:</label>
                <input
                  type="email"
                  class="form-control"
                  id="email"
                  name="email"
                  required
                  placeholder="Email"
                />
              </div>

              <div class="mb-3">
                <div class="form-check">
                  <input
                    class="form-check-input"
                    type="radio"
                    id="o1"
                    name="t"
                    value="projekt"
                    checked
                  />
                  <label class="form-check-label" for="o1"
                    >projekt ötletem van</label
                  >
                </div>
                <div class="form-check">
                  <input
                    class="form-check-input"
                    type="radio"
                    id="o2"
                    name="t"
                    value="kerdes"
                  />
                  <label class="form-check-label" for="o2">kérdésem van</label>
                </div>
              </div>

              <div class="row mb-3 align-items-center">
                <div class="col-md-5">
                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      id="felt"
                      name="felt"
                      required
                    />
                    <label class="form-check-label" for="felt"
                      >elfogadom a felhasználói feltételeket</label
                    >
                  </div>
                </div>
                <div class="col-md-7">
                  <textarea
                    class="form-control"
                    id="szoveg"
                    name="szoveg"
                    rows="4"
                    required
                    placeholder="Arról lenne szó..."
                  ></textarea>
                </div>
              </div>

              <div class="d-flex gap-2">
                <button type="submit" class="btn gomb_kuldes">Küldés</button>
                <button type="reset" class="btn gomb_torles">Törlés</button>
              </div>
            </form>
          </div>
        </div>
        <div class="row g-0 kozepso_szekcio">
          <div
            class="col-lg-6 bal_zona kapcsolat_3 d-flex justify-content-center align-items-center"
          >
            <div>
              <h3>Elérhetőségeim</h3>
              <p>viktoriaszalkai04@gmail.com</p>
              <p>+ 36 30 645 1499</p>
              <p>
                <a
                  href="https://www.linkedin.com/in/viktória-szalkai-a066a9361/"
                  class="linkedin_link"
                  >LinkedIn profil</a
                >
              </p>
            </div>
          </div>
          <div
            class="col-lg-6 jobb_zona kapcsolat_4 d-flex justify-content-center align-items-center"
          >
            <a href="kepek/kep2.jpg" target="_blank">
              <img src="kepek/kep2.jpg" class="thumbnail-img" alt="kockás háttérkép" />
            </a>
          </div>
        </div>
      </main>
    </div>
    <footer>Szalkai Viktória - UQCZF9 <time>2026.04.09</time></footer>
    <script>
  function monokrom() {
    // A 'monokrom_m' osztályt kapcsolgatja
    document.body.classList.toggle('monokrom_m');
  }
</script>
  </body>
</html>
